backend:
  name: github
  repo: kelseytietjen-tech/portfolio
  branch: main
  auth:
    content_api_key: ghp_9tRTOC8RK9nUjHcwgZS3RCgMu5uCli3WsEMED

media_folder: "/"
public_folder: "/"

collections:
  - name: "portfolio"
    label: "Portfolio Content"
    files:
      - name: "main"
        label: "Main Resume"
        file: "index.html"
        fields:
          - {label: "Full Name", name: "full_name", widget: "string", pattern: ["^.{3,}$", "Must be at least 3 characters"]}
          - {label: "Title/Tagline", name: "tagline", widget: "string"}
          - {label: "Main Headline", name: "headline", widget: "text"}
          - {label: "About Section", name: "about", widget: "text"}
          - {label: "Email", name: "email", widget: "string"}
          - {label: "Phone", name: "phone", widget: "string"}
